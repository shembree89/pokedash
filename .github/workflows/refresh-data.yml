name: Refresh meta data

on:
  schedule:
    # Daily at 19:00 UTC = 3pm Eastern (EDT). Drifts to 2pm during EST.
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      top_n:
        description: "Top N pokemon to fetch (default full 50)"
        required: false
        default: "50"

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Refresh meta data from Pikalytics + PokeAPI + pokemondb.net
        run: npm run data:refresh
        env:
          FORCE_COLOR: "1"
        timeout-minutes: 30
      - name: Check for data changes
        id: diff
        run: |
          if git diff --quiet -- public/data; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "pokedash-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "chore(data): weekly refresh $(date -u +%Y-%m-%d)"
          git push
