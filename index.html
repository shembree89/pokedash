<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pokedash</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f0f14;
        --fg: #e6e6e6;
        --accent: #ffcb05;
      }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: clamp(2rem, 6vw, 4rem);
        margin: 0 0 0.5rem;
      }
      h1 span {
        color: var(--accent);
      }
      p {
        opacity: 0.7;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>hello, <span>pokedash</span></h1>
      <p>coming soon.</p>
    </main>
  </body>
</html>
